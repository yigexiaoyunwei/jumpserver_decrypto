name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Linux-x64
          - os: windows-latest
            artifact_name: Windows-x64
          - os: macos-14
            artifact_name: macOS-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (non-Linux)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary --find-links vendor -r requirements.txt
          python -m pip install --prefer-binary --find-links vendor nuitka ordered-set zstandard

      - name: Build binary (Linux x64 via Docker for low glibc)
        if: runner.os == 'Linux'
        run: |
          docker run --rm --platform linux/amd64 \
            -v ${{ github.workspace }}:/src -w /src \
            python:3.12-bullseye bash -lc "
              apt-get update -q &&
              apt-get install -y build-essential patchelf &&
              pip install --upgrade pip &&
              pip install --prefer-binary --find-links /src/vendor -r requirements.txt &&
              pip install --prefer-binary --find-links /src/vendor nuitka ordered-set zstandard &&
              python -m nuitka \
                --onefile \
                --output-filename=jumpserver_decrypto_linux_x64 \
                --include-package=pycryptodo \
                --include-package=gmssl \
                --include-package=Cryptodome \
                --include-package=psycopg2 \
                --include-package=pymysql \
                --include-package=tqdm \
                --include-package=yaml \
                --assume-yes-for-downloads \
                main.py
            "

      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka \
            --onefile \
            --output-filename=jumpserver_decrypto_macos_arm64 \
            --include-package=pycryptodo \
            --include-package=gmssl \
            --include-package=Cryptodome \
            --include-package=psycopg2 \
            --include-package=pymysql \
            --include-package=tqdm \
            --include-package=yaml \
            --assume-yes-for-downloads \
            main.py
        shell: bash

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka `
            --onefile `
            --output-filename=jumpserver_decrypto_windows_x64.exe `
            --include-package=pycryptodo `
            --include-package=gmssl `
            --include-package=Cryptodome `
            --include-package=psycopg2 `
            --include-package=pymysql `
            --include-package=tqdm `
            --include-package=yaml `
            --assume-yes-for-downloads `
            main.py
        shell: pwsh

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: jumpserver_decrypto*
          if-no-files-found: ignore

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 binary
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/src -w /src \
            python:3.12-bullseye bash -lc "
              apt-get update -q &&
              apt-get install -y build-essential patchelf &&
              pip install --upgrade pip &&
              pip install --prefer-binary --find-links /src/vendor -r requirements.txt &&
              pip install --prefer-binary --find-links /src/vendor nuitka ordered-set zstandard &&
              python -m nuitka \
                --onefile \
                --output-filename=jumpserver_decrypto_linux_arm64 \
                --include-package=pycryptodo \
                --include-package=gmssl \
                --include-package=Cryptodome \
                --include-package=psycopg2 \
                --include-package=pymysql \
                --include-package=tqdm \
                --include-package=yaml \
                --assume-yes-for-downloads \
                main.py
            "

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Linux-arm64
          path: jumpserver_decrypto*
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-linux-arm64]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
